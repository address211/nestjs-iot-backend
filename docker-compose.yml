services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot-backend
    depends_on:
      mariadb:
        condition: service_healthy
      mqtt:
        condition: service_started
    env_file:
      - .env
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health | grep -q ''"status":"ok"''']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    container_name: iot-mariadb
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD',
          'healthcheck.sh',
          '--connect',
          '--innodb_initialized',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: iot-mqtt
    ports:
      - '1883:1883'
    volumes:
      - ./docker/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    restart: unless-stopped

volumes:
  mariadb_data:
  mqtt_data:
  mqtt_log:
